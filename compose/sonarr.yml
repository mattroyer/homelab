services:
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - sonarr_config:/config
      - ${MEDIA_ROOT:-./data/media}/tvseries:/tv
      - ${MEDIA_ROOT:-./data/media}/downloads/complete:/downloads/complete
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN_NAME}`)"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "glance.name=Sonarr"
      - "glance.icon=si:sonarr"
      - "glance.url=https://sonarr.${DOMAIN_NAME}"
      - "glance.description=For TV shows"

volumes:
  sonarr_config:
