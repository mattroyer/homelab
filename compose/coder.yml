services:
  coder-db:
    image: postgres:16
    container_name: coder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: ${CODER_POSTGRES_PASSWORD}
      POSTGRES_DB: coder
    volumes:
      - coder_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "coder"]
      interval: 10s
      retries: 5
    networks:
      - homelab

  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: unless-stopped
    privileged: true
    depends_on:
      coder-db:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      CODER_PG_CONNECTION_URL: postgres://coder:${CODER_POSTGRES_PASSWORD}@coder-db:5432/coder?sslmode=disable
      CODER_HTTP_ADDRESS: 0.0.0.0:3000
      CODER_ACCESS_URL: https://coder.${DOMAIN_NAME}
      CODER_WILDCARD_ACCESS_URL: "*.coder.${DOMAIN_NAME}"
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - coder_data:/var/lib/coder
    networks:
      - homelab
    labels:
      - traefik.enable=true
      - traefik.http.routers.coder.rule=Host(`coder.${DOMAIN_NAME}`)
      - traefik.http.routers.coder.entrypoints=https
      - traefik.http.routers.coder.tls=true
      - traefik.http.routers.coder-ws.rule=HostRegexp(`{subdomain:[a-z0-9.-]+}.coder.${DOMAIN_NAME}`)
      - traefik.http.services.coder.loadbalancer.server.port=3000
      - traefik.http.routers.coder-ws.entrypoints=https
      - traefik.http.routers.coder-ws.tls=true
      - traefik.http.routers.coder-ws.service=coder
      - glance.name=Coder
      - glance.icon=di:coder-light
      - glance.url=https://coder.${DOMAIN_NAME}
      - glance.description=Multi-user dev workspaces

volumes:
  coder_db:
  coder_data:

