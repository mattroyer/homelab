services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD=${CODE_SERVER_PASSWORD}
    volumes:
      - ${HOME}/code:/home/coder
      - ./apps/glance/config:/home/coder/glance-config
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.code-server.rule=Host(`code-server.${DOMAIN_NAME}`)"
      - "traefik.http.routers.code-server.entrypoints=https"
      - "traefik.http.routers.code-server.tls=true"
      - "traefik.http.services.code-server.loadbalancer.server.port=8080"
      - "glance.name=Code Server"
      - "glance.icon=di:coder-light"
      - "glance.url=https://code-server.${DOMAIN_NAME}"
      - "glance.description=Personal code server"

