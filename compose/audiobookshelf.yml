services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - audiobookshelf_config:/config
      - audiobookshelf_metadata:/metadata
      - ${MEDIA_ROOT:-./data/media}/audiobooks:/audiobooks
      - ${MEDIA_ROOT:-./data/media}/podcasts:/podcasts
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.rule=Host(`bookshelf.${DOMAIN_NAME}`)"
      - "traefik.http.routers.audiobookshelf.entrypoints=https"
      - "traefik.http.routers.audiobookshelf.tls=true"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
      - "glance.name=Audiobookshelf"
      - "glance.icon=di:audiobookshelf"
      - "glance.url=https://bookshelf.${DOMAIN_NAME}"
      - "glance.description=Audiobooks!!!"

volumes:
  audiobookshelf_config:
  audiobookshelf_metadata:
