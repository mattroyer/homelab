services:
  filebrowser:
    image: hurlenko/filebrowser
    container_name: filebrowser
    user: 1000:1000
    volumes:
      - ${MEDIA_ROOT:-./data/media}:/data
      - filebrowser_config:/config
    environment:
      - FB_BASEURL=/
    restart: unless-stopped
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN_NAME}`)"
      - "traefik.http.routers.filebrowser.entrypoints=https"
      - "traefik.http.routers.filebrowser.tls=true"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=8080"
      - "glance.name=File Browser"
      - "glance.icon=si:filebrowser"
      - "glance.url=https://files.${DOMAIN_NAME}"
      - "glance.description=Browse files in the media root"

volumes:
  filebrowser_config:
