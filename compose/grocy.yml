services:
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - grocy_config:/config
    networks:
      - homelab
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grocy.rule=Host(`grocy.${DOMAIN_NAME}`)"
      - "traefik.http.routers.grocy.entrypoints=https"
      - "traefik.http.routers.grocy.tls=true"
      - "traefik.http.services.grocy.loadbalancer.server.port=80"
      - "glance.name=Grocy"
      - "glance.icon=si:kitchenware"
      - "glance.url=https://grocy.${DOMAIN_NAME}"
      - "glance.description=Household ERP"
volumes:
  grocy_config:

