services:
  it-tools:
    image: corentinth/it-tools
    container_name: it-tools
    restart: unless-stopped
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-tools.rule=Host(`it-tools.${DOMAIN_NAME}`)"
      - "traefik.http.routers.it-tools.entrypoints=https"
      - "traefik.http.routers.it-tools.tls=true"
      - "traefik.http.services.it-tools.loadbalancer.server.port=80"
      - "glance.name=IT Tools"
      - "glance.icon=si:framework"
      - "glance.url=https://it-tools.${DOMAIN_NAME}"
      - "glance.description=All the tools you could need"

