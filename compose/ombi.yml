services:
  ombi:
    image: ghcr.io/linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ombi_config:/config
    networks:
      - homelab
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ombi.rule=Host(`ombi.${DOMAIN_NAME}`)"
      - "traefik.http.routers.ombi.entrypoints=https"
      - "traefik.http.routers.ombi.tls=true"
      - "traefik.http.services.ombi.loadbalancer.server.port=3579"  # Ombi default port
      - "glance.name=Ombi"
      - "glance.icon=si:ombi"
      - "glance.url=https://ombi.${DOMAIN_NAME}"
      - "glance.description=Request media for your server"

volumes:
  ombi_config:

